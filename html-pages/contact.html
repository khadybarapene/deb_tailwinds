<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Création du formulaire de contact </title>
</head>

<body>
  <header>
    <img src="listes-projets/img/logo.jpeg" alt="Logo du Portfolio" class="logo" href="../index.html"/>
    <nav class="nav-menu">
      <a href="lister-projet.html">Liste</a>
      <a href="ajouter-projet.html">Ajouter</a>
      <a href="#" block="contact">Contacts</a>
    </nav>
  </header>

  <main>
    <div class="content">
      <div>
        <button class="btn-back"><a href="../index.html">🔙Retour à l'accueil</a></button>
      </div>
      <h2>Contactez-nous</h2>
      <form id="contactForm">
        <label for="name">Nom:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>

        <div class="btn-sub-res">
          <button type="submit">Envoyer</button>
          <button type="reset">Réinitialiser</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; Portfolio Khady PENE</p>
  </footer>

</html>
